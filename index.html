<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax </title>
    <style>
        /* --- RESET & ROOT VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-deep: #0a0a0a;
            --card-bg: rgba(18, 18, 18, 0.7);
            --border-color: rgba(255, 255, 255, 0.05); /* Identical to main site border opacity */
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- MONOCHROME GALAXY BACKGROUND --- */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at center, #111111 0%, #050505 100%);
        }

        /* --- SIGNATURE ENGINE LAYOUT --- */
        .custom-signature-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .signature-svg {
            overflow: visible;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.9))
                    drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
        }

        .signature-path {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.2px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- LAYOUT CONFIGURATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 4%; /* Identical header spacing */
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-wrapper {
            height: 38px;
        }

        .cart-status {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
        }

        .cart-status:hover {
            background: var(--text-main);
            color: var(--bg-deep);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem 0 2rem; /* Adjusted bottom padding */
        }

        /* --- PRODUCTS GRID --- */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 1:1 Aspect Ratio */
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            color: rgba(255,255,255,0.07);
            font-size: 5rem;
            font-weight: bold;
        }

        .product-details {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(10, 10, 10, 0.8);
        }

        .product-meta .title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .product-meta .price {
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .buy-btn {
            background: none;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .buy-btn:hover {
            background: var(--text-main);
            color: var(--bg-deep);
        }

        /* --- EDGE-TO-EDGE NETWORK FOOTER WRAPPER --- */
        .network-footer {
            width: 100%;
            border-top: 1px solid var(--border-color); /* Goes completely wall-to-wall now */
            padding: 60px 4%; /* Identical horizontal and vertical padding formulas */
            margin-top: 6rem;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .social-link {
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease, transform 0.3s ease;
            display: inline-block;
        }

        .social-link:hover {
            color: var(--text-main);
            transform: scale(1.05);
        }

        .network-banner {
            display: inline-block;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            padding: 1.5rem 3rem;
            text-decoration: none;
            color: var(--text-main);
            font-family: var(--font-mono);
            letter-spacing: 3px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            margin-bottom: 4rem;
        }

        .network-banner:hover {
            border-style: solid;
            border-color: var(--text-main);
            background: rgba(255,255,255,0.02);
        }

        .copyright-bar {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* --- RESPONSIVE CONFIG --- */
        @media (max-width: 768px) {
            header {
                padding: 30px 20px;
            }
            .logo-wrapper {
                height: 30px;
            }
            .social-links {
                gap: 1rem;
            }
            .social-link {
                font-size: 0.75rem;
            }
            .network-footer {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <header>
        <div class="logo-wrapper custom-signature-container">
            <svg class="signature-svg" viewBox="0 0 240 70" height="100%" xmlns="http://www.w3.org/2000/svg">
                <path class="signature-path" d="M 30 54 L 30 16 M 30 18 C 48 10, 68 18, 52 34 C 40 44, 30 40, 30 40" />
                <path class="signature-path" d="M 66 38 C 74 34, 76 46, 84 46 C 92 46, 96 34, 100 34 C 104 34, 106 46, 114 46 C 122 46, 128 22, 134 22 L 128 46 C 132 46, 136 22, 142 22 L 136 46 C 144 46, 146 34, 154 34 C 158 34, 160 46, 168 46 C 174 46, 184 34, 190 40" />
                <path class="signature-path" d="M 45 56 L 210 50" stroke-width="1.2px" opacity="0.85" />
            </svg>
        </div>
        <div class="cart-status" id="cart-counter">Bag 0</div>
    </header>

    <main>
        <div class="store-grid">
            <div class="product-card">
                <div class="product-image-wrapper">
                    <div class="product-image-placeholder">01</div>
                </div>
                <div class="product-details">
                    <div class="product-meta">
                        <div class="title">[Merch Name]</div>
                        <div class="price">[Format/Type] // $[Price]</div>
                    </div>
                    <button class="buy-btn" onclick="addToBag()">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-wrapper">
                    <div class="product-image-placeholder">02</div>
                </div>
                <div class="product-details">
                    <div class="product-meta">
                        <div class="title">[Merch Name]</div>
                        <div class="price">[Format/Type] // $[Price]</div>
                    </div>
                    <button class="buy-btn" onclick="addToBag()">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-wrapper">
                    <div class="product-image-placeholder">03</div>
                </div>
                <div class="product-details">
                    <div class="product-meta">
                        <div class="title">[Merch Name]</div>
                        <div class="price">[Format/Type] // $[Price]</div>
                    </div>
                    <button class="buy-btn" onclick="addToBag()">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-wrapper">
                    <div class="product-image-placeholder">04</div>
                </div>
                <div class="product-details">
                    <div class="product-meta">
                        <div class="title">[Merch Name]</div>
                        <div class="price">[Format/Type] // $[Price]</div>
                    </div>
                    <button class="buy-btn" onclick="addToBag()">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-wrapper">
                    <div class="product-image-placeholder">05</div>
                </div>
                <div class="product-details">
                    <div class="product-meta">
                        <div class="title">[Merch Name]</div>
                        <div class="price">[Format/Type] // $[Price]</div>
                    </div>
                    <button class="buy-btn" onclick="addToBag()">ADD</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="network-footer">
        <div class="social-links">
            <a href="https://x.com/Parallax_x_x" target="_blank" class="social-link">X.com</a>
            <a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank" class="social-link">Instagram</a>
            <a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank" class="social-link">YouTube</a>
            <a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank" class="social-link">TikTok</a>
            <a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank" class="social-link">Facebook</a>
        </div>
        
        <a href="https://discord.com/invite/rhXuzGvM6" target="_blank" class="network-banner">JOIN THE DISCORD</a>
        
        <div class="copyright-bar">
            &copy; 
            <span class="custom-signature-container" style="height: 20px; vertical-align: middle; margin: 0 4px;">
                <svg class="signature-svg" viewBox="0 0 240 70" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <path class="signature-path" d="M 30 54 L 30 16 M 30 18 C 48 10, 68 18, 52 34 C 40 44, 30 40, 30 40" stroke-width="3.5px" />
                    <path class="signature-path" d="M 66 38 C 74 34, 76 46, 84 46 C 92 46, 96 34, 100 34 C 104 34, 106 46, 114 46 C 122 46, 128 22, 134 22 L 128 46 C 132 46, 136 22, 142 22 L 136 46 C 144 46, 146 34, 154 34 C 158 34, 160 46, 168 46 C 174 46, 184 34, 190 40" stroke-width="3.5px" />
                    <path class="signature-path" d="M 45 56 L 210 50" stroke-width="2px" opacity="0.85" />
                </svg>
            </span>| all rights reserved
        </div>
    </footer>

    <script>
        let count = 0;
        function addToBag() {
            count++;
            // Updated template dynamic string to match "Bag X" layout structure
            document.getElementById('cart-counter').innerText = `Bag ${count}`;
        }

        const canvas = document.getElementById('space-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
        }
    </script>
</body>
</html>
